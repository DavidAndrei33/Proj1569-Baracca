version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rotiserie-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - UPLOAD_MAX_SIZE=${UPLOAD_MAX_SIZE}
      - UPLOAD_DIR=${UPLOAD_DIR}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - rotiserie-network

  postgres:
    image: postgres:16-alpine
    container_name: rotiserie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - rotiserie-network

  redis:
    image: redis:7-alpine
    container_name: rotiserie-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - rotiserie-network

  caddy:
    image: caddy:2-alpine
    container_name: rotiserie-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    networks:
      - rotiserie-network

  prometheus:
    image: prom/prometheus:latest
    container_name: rotiserie-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - rotiserie-network

  grafana:
    image: grafana/grafana:latest
    container_name: rotiserie-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - rotiserie-network

volumes:
  uploads:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:

networks:
  rotiserie-network:
    driver: bridge
